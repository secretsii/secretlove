<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>scrath me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        .controls {
            display: none !important;
        }


        body {
            min-height: 100vh;
            background: url('images/bg.jpeg') no-repeat center center;
            background-size: cover;
            font-family: Arial, sans-serif;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .slider {
            overflow: hidden;
            width: 100%;
            touch-action: pan-y;
        }

        .slides {
            display: flex;
            transition: transform 0.3s ease;
        }

        .slide {
            width: 100%;
            flex-shrink: 0;
            border-radius: 10px;
        }

        .player-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-container button {
            padding: 10px;
            font-size: 18px;
        }

        .app-container {
    max-width: 1300px;
    width: 100%;
    background: transparent;
    backdrop-filter: none;
    border-radius: 2rem;
    padding: 1rem;
}

        h1 {
            text-align: center;
            font-weight: 500;
            letter-spacing: 1px;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ffffff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            text-align: center;
            color: #dbbf94;
            font-style: italic;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed #c6a27a;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0,0,0,0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .progress-badge {
            background: #2f201b;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #ffefdb;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: inset 0 0 2px #ab8e64, 0 4px 8px rgba(0,0,0,0.2);
        }

        .progress-badge span {
            color: #f7c59f;
            font-size: 1.4rem;
            font-weight: bold;
        }

        button {
            background: #c1956b;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #2c1c16;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 5px 0 #6e3e2a;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e3e2a;
        }

        .music-toggle {
            background: #7a5a46;
            color: #ffefe0;
            box-shadow: 0 5px 0 #4d3527;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .scratch-card {
            position: relative;
            aspect-ratio: 3 / 4;
            background: #f3e5cf;
            border-radius: 10px;
            overflow: hidden;
            transition: none;
            width: 100%;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .base-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            border-radius: 10px;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            cursor: grab;
            touch-action: none;
            z-index: 10;
        }

        .scratch-canvas:active {
            cursor: grabbing;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.115);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: transparent;
            max-width: 420px;
            width: 100%;
            border-radius: 20px;
            padding: 0;
            text-align: center;
            box-shadow: none;
            border: none;
            position: relative;
        }

        /* Tombol close di pojok kiri atas */
        .modal-close-btn {
    position: absolute;
    top: 40px;
    left: 0;

    width: 36px;
    height: 36px;
    padding: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(255, 255, 255, 0.85);
    color: black;
    border: none;

    border-radius: 50%;
    aspect-ratio: 1 / 1;

    font-size: 16px;
    line-height: 1;
    cursor: pointer;

    box-shadow: none;
}

        .modal-close-btn:hover {
            background: rgb(255, 255, 255);
            transform: scale(1.05);
        }

        .modal-close-btn:active {
            transform: scale(0.95);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h3 {
            font-size: 1.7rem;
            color: #b45f3b;
            margin-bottom: 0.5rem;
        }

        .modal-card .modal-img {
            width: 100%;
            border-radius: 20px;
            margin: 1rem 0;
            max-height: 250px;
            object-fit: cover;
        }

        .modal-card p {
            color: #4f2d1c;
            font-size: 1rem;
            line-height: 1.5;
        }

        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #b98f70;
            padding-bottom: 0.5rem;
        }

        @media (max-width: 600px) {
            .modal-card {
                max-width: 100%;
                border-radius: 0;
            }
            .night-drive-player {
                max-width: 100%;
                border-radius: 0;
            }
            .modal-close-btn {
                top: -35px;
                left: 5px;
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
        }

        @media (max-width: 700px) {
            .app-container {
                padding: 1rem;
            }
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.8rem;
            }
            .controls {
                justify-content: center;
            }
        }

        

/* Perbaikan CSS untuk gallery slider - Foto Lebih Penuh */
.gallery-slider {
    max-width: 100%;
    margin: 0 auto;
}

.gallery-slider {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
}

.gallery-slider-container {
    overflow: hidden;
    border-radius: 12px;
    position: relative;
}

.gallery-slides {
    display: flex;
    transition: transform 0.4s ease;
    cursor: grab;
}

.gallery-slides:active {
    cursor: grabbing;
}

/* Hanya perbaikan ini yang ditambahkan */
.gallery-slide {
    flex-shrink: 0;
    width: 100%;
    padding: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

.gallery-slide img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 4px;
}

.gallery-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.85);
    color: #6976cf;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 0;
    cursor: pointer;
    font-size: 20px;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.gallery-btn:hover {
    background: rgba(255,255,255,0.95);
    transform: translateY(-50%) scale(1.05);
}

.gallery-btn.prev {
    left: 15px;
}

.gallery-btn.next {
    right: 15px;
}

.gallery-dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
    margin-bottom: 5px;
}

.gallery-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4000ff;
    cursor: pointer;
    transition: all 0.2s ease;
}

.gallery-dot.active {
    background: #4000ff;
    width: 24px;
    border-radius: 10px;
}

/* Perbaikan modal card untuk HP */
.modal-card {
    background: transparent;
    max-width: 500px;
    width: 95%;
    border-radius: 20px;
    padding: 0;
    text-align: center;
    box-shadow: none;
    border: none;
}

.modal-card.gallery-mode {
    width: 92%;
    max-width: 400px;
    padding: 0.4rem;
    border-radius: 1px;
}


/* Perbaikan modal card agar tidak terlalu lebar */
.modal-card {
    background: transparent;
    max-width: 400px;
    width: 90%;
    border-radius: 20px;
    padding: 0;
    text-align: center;
    box-shadow: none;
    border: none;
}

.modal-card.gallery-mode {
    background: rgb(255, 255, 255);
    padding: 1rem;
    border-radius: 8px;
    backdrop-filter: blur(0px);
}

@media (max-width: 600px) {
    .modal-card {
        max-width: 95%;
        width: 95%;
    }
    
    .gallery-slider {
        max-width: 280px;
    }
    
    .gallery-slide img {
        max-height: 240px;
    }
}

        /* ========== MUSIC PLAYER STYLE ========== */

        /* ========== EXACT NOTEPAD STYLE FROM IMAGE ========== */

        function forceFullReveal(cardObj) {
            if(cardObj.revealed) return;
            cardObj.revealed = true;
            const ctx = cardObj.ctx;
            const w = cardObj.canvas.width;
            const h = cardObj.canvas.height;
            ctx.globalCompositeOperation = "destination-out";
            ctx.fillRect(0, 0, w, h);
            ctx.clearRect(0, 0, w, h);
            cardObj.canvas.style.display = 'none';

        function getScratchPercentage(cardObj) {
            if(cardObj.revealed) return 100;
            const canvas = cardObj.canvas;
            const ctx = cardObj.ctx;
            const w = canvas.width, h = canvas.height;
            if(w === 0 || h === 0) return 0;
            try {
                const pixels = ctx.getImageData(0, 0, w, h);
                const data = pixels.data;
                let transparentPixels = 0;
                for (let i = 3; i < data.length; i += 4) if (data[i] === 0) transparentPixels++;
                return (transparentPixels / (w * h)) * 100;
            } catch(e) { return 0; }
        }

        function initScratchCard(cardObj) {
            const canvas = cardObj.canvas;
            const ctx = cardObj.ctx;
            const rect = canvas.getBoundingClientRect();
            let w = rect.width, h = rect.height;
            if (w === 0 || h === 0) { setTimeout(() => initScratchCard(cardObj), 100); return; }
            canvas.width = w; canvas.height = h;
            canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
            canvas.style.display = 'block';
            ctx.globalCompositeOperation = "source-over";
            const gradient = ctx.createLinearGradient(0, 0, w, h);
            gradient.addColorStop(0, '#bdbdbd');
            gradient.addColorStop(1, '#8d8d8d');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
            cardObj.brushSize = Math.max(30, Math.min(w, h) * 0.1);
            cardObj.drawing = false;
            function getCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                else { clientX = e.clientX; clientY = e.clientY; }
                let x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;
                x = Math.min(Math.max(0, x), canvas.width);
                y = Math.min(Math.max(0, y), canvas.height);
                return { x, y };
            }
            function drawDot(x, y) {
                if(cardObj.revealed) return;
                ctx.globalCompositeOperation = "destination-out";
                ctx.beginPath();
                ctx.arc(x, y, cardObj.brushSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = "source-over";
                if (getScratchPercentage(cardObj) >= 99.5 && !cardObj.revealed) forceFullReveal(cardObj);
            }
            function drawLine(x1, y1, x2, y2) {
                const distance = Math.hypot(x2 - x1, y2 - y1);
                const steps = Math.max(Math.ceil(distance / (cardObj.brushSize / 2)), 1);
                for(let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    drawDot(x1 + (x2 - x1) * t, y1 + (y2 - y1) * t);
                }
            }
            function startDraw(e) { if(cardObj.revealed) return; e.preventDefault(); const coord = getCoords(e); cardObj.drawing = true; drawDot(coord.x, coord.y); cardObj.lastCoord = coord; }
            function onDraw(e) { if(!cardObj.drawing || cardObj.revealed) return; e.preventDefault(); const coord = getCoords(e); if(cardObj.lastCoord) drawLine(cardObj.lastCoord.x, cardObj.lastCoord.y, coord.x, coord.y); cardObj.lastCoord = coord; }
            function endDraw() { cardObj.drawing = false; cardObj.lastCoord = null; }
            canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mousemove', onDraw);
            canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mouseleave', endDraw);
            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', onDraw, { passive: false });
            canvas.addEventListener('touchend', endDraw); canvas.addEventListener('touchcancel', endDraw);
        }

                    const cursor = document.createElement('span');
                    cursor.className = 'cursor-blink';
                    cursor.style.cssText = 'display: inline-block; width: 2px; height: 1.2em; background-color: #8b7a66; margin-left: 2px; animation: blink 1s infinite; vertical-align: middle;';
                    contentDiv.appendChild(cursor);
                    setTimeout(() => {
                        if(cursor.parentNode) cursor.remove();
                    }, 1500);
                }
            }, 45);
            
            wrapper.typingInterval = interval;
            return wrapper;
        }

        function createBlogPost(data) {
            const wrapper = document.createElement('div'); wrapper.className = 'blog-container';
            const previewImg = document.createElement('div'); previewImg.className = 'preview-image'; previewImg.style.backgroundImage = `url('${data.previewImage}')`; wrapper.appendChild(previewImg);
            const branding = document.createElement('div'); branding.className = 'branding'; branding.innerHTML = `<div class="publication-label">${data.publication}</div><div class="main-title">${data.mainTitle}</div><div class="subtitle">${data.subtitle}</div>`; wrapper.appendChild(branding);
            const postContent = document.createElement('div'); postContent.className = 'post-content';
            postContent.innerHTML = `<div class="post-header"><div class="author-info"><div class="avatar" style="background-image: url('${data.author.avatar}')"></div><div class="author-name">${data.author.name}</div></div><div class="post-date">${data.postDate}</div></div><div class="post-body"><div class="post-text"><div class="post-title">${data.postTitle}</div><div class="post-description">${data.postDesc}</div></div><div class="post-image" style="background-image: url('${data.photos[0]}')"></div></div>`;
            wrapper.appendChild(postContent);
            return wrapper;
        }

        function createProfileCard(data) {
            const wrapper = document.createElement('div'); wrapper.className = 'aesthetic-profile';
            wrapper.innerHTML = `<div class="profile-header"><div class="username">${data.username}</div><div class="home-icon">⌂</div></div><div class="profile-gallery-row">${data.galleryImages.map(img => `<div class="profile-gallery-thumb" style="background-image: url('${img}');"></div>`).join('')}</div><div class="caption-note">${data.captionText}</div><div class="profile-pill-tags">${data.tags.map(tag => `<div class="profile-pill-tag">${tag}</div>`).join('')}</div><div class="profile-stats-bar"><div class="notes-count">${data.notesCount}</div><div class="profile-action-icons"><span>💬</span> <span>🔄</span> <span>❤️</span></div></div><div class="carrd-credit">${data.carrdCredit}</div>`;
            return wrapper;
        }

        // MODIFIED CHAT INTERACTIVE with photo behind clock, line under username, line on top
        function createChatInteractive(data) {
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-container';
            
            let currentPage = 'notification';
            
            const getDate = () => {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                const now = new Date();
                return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
            };
            
            const getTime = () => {
                const now = new Date();
                return now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            };
            
            const renderNotification = () => {
    return `
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-avatar" style="background-image: url('${data.avatar || 'images/avatar.jpg'}')"></div>
                <div class="chat-site-name username-with-line">Barga</div>
            </div>
            <div class="chat-header-right"></div>
        </div>
        <div class="top-line"></div>

        <div class="notification-area">
            <div class="datetime-with-bg">
                <div class="date-large">${getDate()}</div>
                <div class="time-large">${getTime()}</div>

                <div class="inside-notif-content">
                    <div class="notification-text">@${data.username} wants to send you a message!</div>
                    <div class="notification-buttons">
                        <button class="notif-btn accept" id="acceptBtn">Accept</button>
                        <button class="notif-btn reject" id="rejectBtn">Reject</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-footer">
            <span class="return-home" id="returnHomeBtn">return home</span>
            <span class="footer-credit">୭ ˚. ᵎᵎ</span>
        </div>
    `;
};
            
            const renderChat = () => {
                return `
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <div class="chat-avatar" style="background-image: url('${data.avatar || 'images/avatar.jpg'}')"></div>
                            <div class="chat-site-name username-with-line">Barga</div>
                        </div>
                        <div class="chat-header-right"></div>
                    </div>
                    <div class="top-line"></div>
                    <div class="chat-messages-area" id="chatMessagesArea">
                        <div class="system-message">you accepted @${data.username}'s request.</div>
                        <div class="message-row left">
                            <div class="chat-avatar-small" style="background-image: url('${data.avatar || 'images/avatar.jpg'}')"></div>
                            <div class="message-bubble">i still remember how obvious i was when i started liking you.</div>
                        </div>
                        <div class="message-row right">
                            <div class="message-bubble">i noticed… i just didn’t expect to like you back this much.</div>
                        </div>
                        <div class="message-row left">
                            <div class="chat-avatar-small" style="background-image: url('${data.avatar || 'images/avatar.jpg'}')"></div>
                            <div class="message-bubble">loving you is the easiest thing i've ever done because it feels like it's what i was meant to do all along.</div>
                        </div>
                        <div class="message-row left">
                            <div class="chat-avatar-small" style="background-image: url('${data.avatar || 'images/avatar.jpg'}')"></div>
                            <div class="message-bubble">and now you’re literally my favorite part of every day</div>
                        </div>
                        
                    </div>
                    <div class="chat-footer">
                        <span class="return-home" id="returnHomeBtn">return home</span>
                        <span class="footer-credit">୭ ˚. ᵎᵎ</span>
                    </div>
                `;
            };
            
            function refreshContent() {
                wrapper.innerHTML = currentPage === 'notification' ? renderNotification() : renderChat();
                if (currentPage === 'notification') {
                    const acceptBtn = wrapper.querySelector('#acceptBtn');
                    const rejectBtn = wrapper.querySelector('#rejectBtn');
                    const returnHome = wrapper.querySelector('#returnHomeBtn');
                    if (acceptBtn) acceptBtn.onclick = () => { currentPage = 'chat'; refreshContent(); };
                    if (rejectBtn) rejectBtn.onclick = () => { /* do nothing, just reject */ };
                    if (returnHome) returnHome.onclick = () => { /* stay */ };
                } else {
                    const returnHome = wrapper.querySelector('#returnHomeBtn');
                    if (returnHome) returnHome.onclick = () => { currentPage = 'notification'; refreshContent(); };
                }
            }
            
            refreshContent();
            return wrapper;
        }

        function openModal(index) {
            const data = cardsData[index];
            const modal = document.getElementById('detailModal');
            const modalDynamicContent = document.getElementById('modalDynamicContent');
            const modalCard = modal.querySelector('.modal-card');
            modalCard.classList.remove('gallery-mode');
            
            if (window.currentTypingInterval) { clearInterval(window.currentTypingInterval); window.currentTypingInterval = null; }
            modalDynamicContent.innerHTML = '';
            
            if (data.type === "gallery") {
                modalCard.classList.add('gallery-mode');
                modalDynamicContent.appendChild(createInstagramGallery(data.images));
            }
            else if (data.type === "music_player") modalDynamicContent.appendChild(createMusicPlayer(data));
            else if (data.type === "letter") { const letter = createLetterWithTyping(data); modalDynamicContent.appendChild(letter); if (letter.typingInterval) window.currentTypingInterval = letter.typingInterval; }
            else if (data.type === "blog_post") modalDynamicContent.appendChild(createBlogPost(data));
            else if (data.type === "profile_card") modalDynamicContent.appendChild(createProfileCard(data));
            else if (data.type === "chat_interactive") modalDynamicContent.appendChild(createChatInteractive(data));
            else { const img = document.createElement('img'); img.className = 'modal-img'; img.src = data.modalImg || data.hiddenImg; img.style.width = '100%'; img.style.borderRadius = '16px'; const msg = document.createElement('p'); msg.innerText = data.modalMessage || "💕"; modalDynamicContent.appendChild(img); modalDynamicContent.appendChild(msg); }
            modal.classList.add('show');
        }
        
        function closeModal() { const modal = document.getElementById('detailModal'); modal.classList.remove('show'); if (window.currentTypingInterval) { clearInterval(window.currentTypingInterval); window.currentTypingInterval = null; } }

        function buildCards() {
            const grid = document.getElementById('cardsGrid'); grid.innerHTML = ''; cards = []; revealedCount = 0;
            for(let i = 0; i < totalCards; i++) {
                const data = cardsData[i];
                const cardDiv = document.createElement('div'); cardDiv.className = 'scratch-card';
                const inner = document.createElement('div'); inner.className = 'card-inner';
                const baseLayer = document.createElement('div'); baseLayer.className = 'base-layer';
                baseLayer.style.background = `url('${data.hiddenImg}')`; baseLayer.style.backgroundSize = "cover"; baseLayer.style.backgroundPosition = "center";
                inner.appendChild(baseLayer);
                const canvas = document.createElement('canvas'); canvas.className = 'scratch-canvas';
                inner.appendChild(canvas); cardDiv.appendChild(inner); grid.appendChild(cardDiv);
                const cardObj = { cardDiv, canvas, ctx: canvas.getContext('2d'), revealed: false, brushSize: 30, drawing: false, lastCoord: null, index: i };
                cards.push(cardObj);
                setTimeout(() => { if(cardObj.canvas && !cardObj.revealed) initScratchCard(cardObj); }, 50);
                baseLayer.addEventListener('click', (e) => { e.stopPropagation(); if(cardObj.revealed) openModal(i); });
            }
            updateProgress();
        }
        
        function resetAllCards() {
            cards.forEach(card => {
                if(card.revealed) { card.canvas.style.display = 'block'; card.revealed = false; setTimeout(() => { if(card.canvas && !card.revealed) initScratchCard(card); }, 50); }
                else { setTimeout(() => { if(card.canvas && !card.revealed) initScratchCard(card); }, 50); }
            });
            revealedCount = 0; updateProgress();
        }
        
        function initMusic() { bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"); bgMusic.loop = true; bgMusic.volume = 0.2; }
        function toggleMusic() { if(!bgMusic) initMusic(); if(musicPlaying) { bgMusic.pause(); musicPlaying = false; document.getElementById('toggleMusicBtn').innerHTML = "🎵 Putar Musik"; } else { bgMusic.play().catch(e => console.log("Klik lagi untuk memutar musik")); musicPlaying = true; document.getElementById('toggleMusicBtn').innerHTML = "🔇 Hentikan Musik"; } }
        
        document.getElementById('resetAllBtn').addEventListener('click', resetAllCards);
        document.getElementById('toggleMusicBtn').addEventListener('click', toggleMusic);
        
        const closeBtn = document.querySelector('.modal-close-btn');
        if (closeBtn) {
            closeBtn.addEventListener('click', closeModal);
        }
        
        document.getElementById('detailModal').addEventListener('click', (e) => { if(e.target === document.getElementById('detailModal')) closeModal(); });
        
        buildCards();
        
        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { cards.forEach(card => { if(!card.revealed && card.canvas) initScratchCard(card); }); }, 250); });
    })();
</script>
</body>
</html>
